<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>In-Store Inventory — TCG Stock Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070708;
    --surface: #111113;
    --surface-hover: #18181b;
    --border: rgba(255, 255, 255, 0.06);
    --border-focus: rgba(255, 255, 255, 0.18);
    --text: #e4e4e7;
    --text-muted: #a1a1aa;
    --text-dim: #52525b;
    --green: #22c55e;
    --green-bg: rgba(34, 197, 94, 0.08);
    --red: #ef4444;
    --red-bg: rgba(239, 68, 68, 0.08);
    --amber: #f59e0b;
    --amber-bg: rgba(245, 158, 11, 0.08);
    --blue: #60a5fa;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-smooth: cubic-bezier(0.22, 1, 0.36, 1);
    --radius: 10px;
    --radius-sm: 6px;
    --font: 'Inter', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  body {
    font-family: var(--font);
    font-size: 14px;
    font-weight: 400;
    line-height: 1.6;
    letter-spacing: -0.01em;
    background: var(--bg);
    color: var(--text);
    padding: 48px 24px;
    max-width: 1100px;
    margin: 0 auto;
    min-height: 100vh;
  }
  a { color: var(--text-muted); text-decoration: none; transition: color 0.2s var(--ease); }
  a:hover { color: var(--text); }

  .top-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 48px;
  }
  .back-link {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--text-dim);
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    transition: all 0.2s var(--ease);
  }
  .back-link:hover {
    color: var(--text);
    background: var(--surface);
  }

  h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1.15;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: -0.01em;
    color: var(--text-muted);
    margin-bottom: 40px;
  }

  .search-section {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 40px;
    padding: 6px;
    padding-left: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 60px;
    max-width: 480px;
    transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease);
  }
  .search-section:focus-within {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 8px 24px rgba(0,0,0,0.4);
  }
  .search-section input[type="text"] {
    flex: 1;
    background: transparent;
    border: none;
    padding: 10px 4px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: -0.01em;
    outline: none;
    min-width: 0;
  }
  .search-section input[type="text"]::placeholder {
    color: var(--text-dim);
    font-weight: 400;
  }
  .search-section button {
    background: var(--text);
    border: none;
    border-radius: 60px;
    padding: 8px 18px;
    color: var(--bg);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: all 0.2s var(--ease);
    flex-shrink: 0;
  }
  .search-section button:hover {
    background: #fafafa;
    transform: scale(1.02);
  }
  .search-section button:active {
    transform: scale(0.97);
  }
  .search-section button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
  }
  #statusLabel {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: -0.01em;
    color: var(--text-dim);
    margin-left: auto;
    white-space: nowrap;
  }

  .error-box {
    display: none;
    padding: 12px 18px;
    margin-bottom: 24px;
    background: var(--red-bg);
    border: 1px solid rgba(239, 68, 68, 0.15);
    border-radius: var(--radius);
    color: #fca5a5;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.5;
  }
  .loading, .no-results {
    display: none;
    text-align: center;
    padding: 64px 24px;
    color: var(--text-dim);
    font-size: 14px;
    letter-spacing: -0.01em;
  }
  .loading {
    position: relative;
  }
  .loading::after {
    content: '';
    display: block;
    width: 20px;
    height: 20px;
    margin: 16px auto 0;
    border: 2px solid var(--border);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 0.8s var(--ease) infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .summary {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 36px;
    padding: 0 2px;
  }
  .summary-item {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .summary-item label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .summary-item value {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .summary-item + .summary-item::before {
    content: '';
    display: block;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--text-dim);
    margin-right: 4px;
  }

  .section {
    margin-bottom: 40px;
    animation: fadeUp 0.4s var(--ease-smooth) both;
  }
  .section:nth-child(2) { animation-delay: 0.05s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .section-header h2 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.3;
  }
  .section-header .count {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-dim);
    letter-spacing: -0.01em;
  }

  .product-group {
    margin-bottom: 28px;
  }
  .product-group:last-child { margin-bottom: 0; }
  .product-name {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 10px;
    padding-left: 2px;
  }
  .product-name .error-inline {
    color: #fca5a5;
    font-weight: 400;
    font-size: 13px;
  }

  .store-tiles {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .store-tile {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: -0.01em;
    color: var(--text-muted);
    transition: all 0.2s var(--ease);
    cursor: default;
    white-space: nowrap;
  }
  .store-tile:hover {
    background: var(--surface-hover);
    border-color: rgba(255,255,255,0.1);
    transform: translateY(-1px);
  }
  .store-tile .tile-id {
    font-weight: 500;
    color: var(--text);
  }
  .store-tile .tile-city {
    color: var(--text-dim);
  }
  .store-tile .tile-dist {
    color: var(--text-dim);
    font-size: 12px;
  }
  .store-tile .tile-qty {
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    min-width: 20px;
    text-align: center;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 12px;
  }
  .store-tile .tile-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .tile-qty.qty-ok { color: var(--green); background: var(--green-bg); }
  .tile-qty.qty-zero { color: var(--red); background: var(--red-bg); }
  .tile-dot.dot-in-stock { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.3); }
  .tile-dot.dot-out-of-stock { background: var(--red); }
  .tile-dot.dot-low-stock { background: var(--amber); }
  .tile-dot.dot-unknown { background: var(--text-dim); }

  .status-badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 60px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .status-in-stock { background: var(--green-bg); color: var(--green); }
  .status-out-of-stock { background: var(--red-bg); color: var(--red); }
  .status-low-stock { background: var(--amber-bg); color: var(--amber); }
  .status-unknown { background: var(--surface-hover); color: var(--text-dim); }

  .empty-message {
    font-size: 13px;
    color: var(--text-dim);
    padding: 4px 2px;
    letter-spacing: -0.01em;
  }

  @media (max-width: 640px) {
    body { padding: 28px 16px; }
    h1 { font-size: 24px; }
    .search-section { max-width: 100%; padding-left: 14px; }
    #statusLabel { display: none; }
    .summary { gap: 16px; flex-wrap: wrap; }
    .summary-item value { font-size: 16px; }
    .store-tile { font-size: 12px; padding: 6px 10px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <a class="back-link" href="index.html">&larr; Dashboard</a>
</div>
<h1>In-Store Inventory</h1>
<p class="subtitle">Check stock at nearby Target &amp; Best Buy stores by ZIP code</p>

<div class="search-section">
  <input type="text" id="zipInput" placeholder="ZIP code" maxlength="5" inputmode="numeric" pattern="[0-9]*">
  <button id="searchBtn">Search</button>
  <label id="statusLabel">Enter a ZIP to search</label>
</div>

<div class="error-box" id="errorBox"></div>
<div class="loading" id="loading">Searching Target &amp; Best Buy stores</div>
<div class="no-results" id="noResults">No stores found near this ZIP code.</div>

<div id="results"></div>

<script>
const API_BASE = window.location.origin.startsWith('http://localhost') || window.location.origin.startsWith('http://127.0.0.1')
  ? ''
  : '/api';

const searchBtn = document.getElementById('searchBtn');
const zipInput = document.getElementById('zipInput');
const statusLabel = document.getElementById('statusLabel');
const errorBox = document.getElementById('errorBox');
const loading = document.getElementById('loading');
const noResults = document.getElementById('noResults');
const resultsDiv = document.getElementById('results');

zipInput.addEventListener('input', () => {
  zipInput.value = zipInput.value.replace(/\D/g, '').slice(0, 5);
});

zipInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') search();
});

searchBtn.addEventListener('click', search);

async function search() {
  const zip = zipInput.value.trim();
  if (!/^\d{5}$/.test(zip)) {
    showError('Enter a valid 5-digit ZIP code');
    return;
  }

  errorBox.style.display = 'none';
  loading.style.display = 'block';
  noResults.style.display = 'none';
  resultsDiv.innerHTML = '';
  statusLabel.textContent = 'Searching...';
  searchBtn.disabled = true;

  try {
    const resp = await fetch(`${API_BASE}/lookup?zip=${zip}`);
    if (!resp.ok) throw new Error(`Server error ${resp.status}`);
    const data = await resp.json();
    render(data);
  } catch (err) {
    showError(`Search failed: ${err.message}`);
  } finally {
    loading.style.display = 'none';
    searchBtn.disabled = false;
  }
}

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
  loading.style.display = 'none';
  noResults.style.display = 'none';
}

function render(data) {
  const hasTarget = data.target && data.target.length > 0;
  const hasBestBuy = data.bestbuy && data.bestbuy.length > 0;

  if (!hasTarget && !hasBestBuy) {
    noResults.style.display = 'block';
    statusLabel.textContent = 'No store data returned';
    return;
  }

  statusLabel.textContent = `ZIP ${data.zip}`;

  let totalInStock = 0;
  let totalStores = 0;

  let html = '';

  if (hasTarget) {
    let targetInStock = 0;
    let targetStores = 0;
    let productRows = '';
    for (const prod of data.target) {
      if (prod.error) {
        productRows += `<div class="product-group"><div class="product-name">${prod.name || prod.tcin} <span class="error-inline">(${prod.error})</span></div></div>`;
        continue;
      }
      const stores = prod.stores || [];
      targetStores += stores.length;
      targetInStock += stores.filter(s => s.quantity > 0).length;
      productRows += `<div class="product-group"><div class="product-name">${escHtml(prod.name)}</div>`;
      if (stores.length === 0) {
        productRows += `<div class="empty-message">No nearby stores</div>`;
      } else {
        productRows += `<div class="store-tiles">`;
        for (const s of stores) {
          const qtyClass = s.quantity > 0 ? 'qty-ok' : 'qty-zero';
          const dotClass = s.quantity > 0 ? 'dot-in-stock' : 'dot-out-of-stock';
          productRows += `<div class="store-tile">
            <span class="tile-dot ${dotClass}"></span>
            <span class="tile-id">#${escHtml(s.store_id)}</span>
            <span class="tile-city">${escHtml(s.city)}</span>
            <span class="tile-dist">${s.distance ?? '-'} mi</span>
            <span class="tile-qty ${qtyClass}">${s.quantity}</span>
          </div>`;
        }
        productRows += `</div>`;
      }
      productRows += `</div>`;
    }
    totalInStock += targetInStock;
    totalStores += targetStores;
    html += `<div class="section">
      <div class="section-header">
        <h2>Target</h2>
        <span class="count">${targetInStock} in-stock &middot; ${targetStores} stores</span>
      </div>${productRows}
    </div>`;
  }

  if (hasBestBuy) {
    let bbInStock = 0;
    let bbStores = 0;
    let productRows = '';
    for (const prod of data.bestbuy) {
      if (prod.error) {
        productRows += `<div class="product-group"><div class="product-name">${prod.name || prod.sku} <span class="error-inline">(${prod.error})</span></div></div>`;
        continue;
      }
      const stores = prod.stores || [];
      bbStores += stores.length;
      bbInStock += stores.filter(s => s.lowStock !== true).length;
      productRows += `<div class="product-group"><div class="product-name">${escHtml(prod.name)}</div>`;
      if (stores.length === 0) {
        productRows += `<div class="empty-message">No nearby stores</div>`;
      } else {
        productRows += `<div class="store-tiles">`;
        for (const s of stores) {
          const dotClass = s.lowStock ? 'dot-low-stock' : s.status === 'IN_STOCK' ? 'dot-in-stock' : 'dot-unknown';
          productRows += `<div class="store-tile">
            <span class="tile-dot ${dotClass}"></span>
            <span class="tile-id">${escHtml(s.name || `BB #${s.store_id}`)}</span>
            <span class="tile-city">${escHtml(s.city)}</span>
            <span class="tile-dist">${s.distance ?? '-'} mi</span>
            <span class="status-badge ${s.lowStock ? 'status-low-stock' : s.status === 'IN_STOCK' ? 'status-in-stock' : 'status-unknown'}">${s.lowStock ? 'LOW' : s.status === 'IN_STOCK' ? 'IN' : '—'}</span>
          </div>`;
        }
        productRows += `</div>`;
      }
      productRows += `</div>`;
    }
    totalInStock += bbInStock;
    totalStores += bbStores;
    html += `<div class="section">
      <div class="section-header">
        <h2>Best Buy</h2>
        <span class="count">${bbInStock} available &middot; ${bbStores} stores</span>
      </div>${productRows}
    </div>`;
  }

  resultsDiv.innerHTML = `
    <div class="summary">
      <div class="summary-item"><label>ZIP</label><value>${escHtml(data.zip)}</value></div>
      <div class="summary-item"><label>Stores</label><value>${totalStores}</value></div>
      <div class="summary-item"><label>In Stock</label><value>${totalInStock}</value></div>
    </div>
    ${html}
  `;
}

function escHtml(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
</script>
</body>
</html>
