<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>In-Store Inventory — TCG Stock Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,200;14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050505;
    --surface: #0c0c0c;
    --surface-hover: #141414;
    --text: #e8e8e8;
    --text-secondary: #888;
    --text-tertiary: #484848;
    --green: #22c65e;
    --green-bg: rgba(34, 198, 94, 0.07);
    --red: #ef4444;
    --red-bg: rgba(239, 68, 68, 0.07);
    --amber: #eab308;
    --amber-bg: rgba(234, 179, 8, 0.07);
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
    --radius: 6px;
    --font: 'Inter', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  body {
    font-family: var(--font);
    font-weight: 400;
    font-size: 14px;
    line-height: 1.6;
    letter-spacing: -0.012em;
    background: var(--bg);
    color: var(--text);
    padding: 80px 32px 120px;
    max-width: 800px;
    margin: 0 auto;
    min-height: 100vh;
  }
  a { color: var(--text-secondary); text-decoration: none; transition: color 0.2s var(--ease); }
  a:hover { color: var(--text); }

  .top {
    margin-bottom: 96px;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .top a {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: -0.01em;
    color: var(--text-tertiary);
    transition: color 0.2s var(--ease);
  }
  .top a:hover { color: var(--text-secondary); }

  h1 {
    font-size: 40px;
    font-weight: 500;
    letter-spacing: -0.035em;
    line-height: 1.05;
    margin-bottom: 16px;
  }
  .subtitle {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: -0.01em;
    line-height: 1.5;
    color: var(--text-tertiary);
    margin-bottom: 48px;
    max-width: 400px;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--text-tertiary);
    transition: border-color 0.25s var(--ease);
  }
  .input-row:focus-within {
    border-bottom-color: var(--text-secondary);
  }
  .input-row input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 4px 0;
    color: var(--text);
    font-family: var(--font);
    font-size: 20px;
    font-weight: 300;
    letter-spacing: -0.02em;
    outline: none;
    min-width: 0;
  }
  .input-row input::placeholder {
    color: var(--text-tertiary);
    font-weight: 300;
  }
  .input-row button {
    background: none;
    border: none;
    padding: 4px 0;
    color: var(--text-tertiary);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: color 0.2s var(--ease);
    flex-shrink: 0;
    opacity: 0;
    pointer-events: none;
  }
  .input-row.has-value button {
    opacity: 1;
    pointer-events: auto;
  }
  .input-row button:hover { color: var(--text); }
  .input-row button:disabled { display: none; }
  .input-hint {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-tertiary);
    letter-spacing: -0.01em;
    margin-bottom: 40px;
    min-height: 18px;
    transition: color 0.2s var(--ease);
  }
  .input-hint.active { color: var(--text-secondary); }

  .error-box {
    display: none;
    padding: 10px 0;
    margin-bottom: 32px;
    color: var(--red);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: -0.01em;
    line-height: 1.5;
  }

  .loading {
    display: none;
    margin: 48px 0;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: -0.01em;
    color: var(--text-tertiary);
  }

  .no-results {
    display: none;
    margin: 48px 0;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: -0.01em;
    color: var(--text-tertiary);
  }

  .summary-bar {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 48px;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: -0.01em;
    color: var(--text-secondary);
  }
  .summary-bar value {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-left: 4px;
  }
  .summary-bar .sep { color: var(--text-tertiary); }

  .section {
    margin-bottom: 48px;
    animation: fadeIn 0.5s var(--ease) both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .section-head h2 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }
  .section-head .count {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-tertiary);
    letter-spacing: -0.01em;
  }
  .section-head .line {
    flex: 1;
    height: 1px;
    background: var(--text-tertiary);
    opacity: 0.3;
  }

  .product {
    margin-bottom: 32px;
  }
  .product:last-child { margin-bottom: 0; }
  .product-header {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 10px;
  }
  .product-header .error-inline {
    color: var(--text-tertiary);
    font-weight: 400;
  }

  .stores {
    display: flex;
    flex-wrap: wrap;
    column-gap: 4px;
    row-gap: 4px;
  }
  .store {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 8px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: -0.01em;
    color: var(--text-secondary);
    cursor: default;
    transition: background 0.15s var(--ease);
  }
  .store:hover { background: var(--surface-hover); }
  .store .id {
    color: var(--text);
    font-weight: 450;
  }
  .store .city {
    color: var(--text-tertiary);
  }
  .store .dist {
    color: var(--text-tertiary);
    font-size: 12px;
  }
  .store .qty {
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    font-size: 12px;
  }
  .store .qty.zero { color: var(--red); }
  .store .qty.ok { color: var(--green); }
  .store .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: box-shadow 0.2s var(--ease);
  }
  .dot.green { background: var(--green); box-shadow: 0 0 5px rgba(34,198,94,0.25); }
  .dot.red { background: var(--red); }
  .dot.amber { background: var(--amber); }
  .dot.gray { background: var(--text-tertiary); }
  .store .label {
    font-size: 11px;
    font-weight: 500;
    padding: 0 5px;
    border-radius: 3px;
  }
  .store .label.green { color: var(--green); background: var(--green-bg); }
  .store .label.red { color: var(--red); background: var(--red-bg); }
  .store .label.amber { color: var(--amber); background: var(--amber-bg); }
  .store .label.gray { color: var(--text-tertiary); background: transparent; }

  .empty-msg {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-tertiary);
    letter-spacing: -0.01em;
  }

  @media (max-width: 640px) {
    body { padding: 48px 20px 80px; }
    h1 { font-size: 28px; }
    .top { margin-bottom: 64px; }
    .input-row input { font-size: 17px; }
    .summary-bar { flex-wrap: wrap; gap: 16px; }
    .summary-bar value { font-size: 17px; }
  }
</style>
</head>
<body>

<div class="top">
  <a href="index.html">Dashboard</a>
</div>

<h1>In-Store<br>Inventory</h1>
<p class="subtitle">Check real-time stock at nearby Target and Best Buy stores</p>

<div class="input-row" id="inputRow">
  <input type="text" id="zipInput" placeholder="Enter ZIP code" maxlength="5" inputmode="numeric" pattern="[0-9]*" autocomplete="postal-code">
  <button id="searchBtn">Search</button>
</div>
<div class="input-hint" id="inputHint">Type a 5-digit ZIP, then press Enter</div>

<div class="error-box" id="errorBox"></div>
<div class="loading" id="loading">Searching nearby stores…</div>
<div class="no-results" id="noResults">No stores found near this ZIP</div>

<div id="results"></div>

<script>
const API_BASE = window.location.origin.startsWith('http://localhost') || window.location.origin.startsWith('http://127.0.0.1')
  ? ''
  : '/api';

const inputRow = document.getElementById('inputRow');
const searchBtn = document.getElementById('searchBtn');
const zipInput = document.getElementById('zipInput');
const inputHint = document.getElementById('inputHint');
const errorBox = document.getElementById('errorBox');
const loading = document.getElementById('loading');
const noResults = document.getElementById('noResults');
const resultsDiv = document.getElementById('results');

zipInput.addEventListener('input', () => {
  zipInput.value = zipInput.value.replace(/\D/g, '').slice(0, 5);
  inputRow.classList.toggle('has-value', zipInput.value.length > 0);
});

zipInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') search();
});

searchBtn.addEventListener('click', search);

async function search() {
  const zip = zipInput.value.trim();
  if (!/^\d{5}$/.test(zip)) {
    inputHint.textContent = 'Enter a valid 5-digit ZIP code';
    inputHint.style.color = '#ef4444';
    return;
  }

  inputHint.style.color = '';
  errorBox.style.display = 'none';
  loading.style.display = 'block';
  noResults.style.display = 'none';
  resultsDiv.innerHTML = '';
  inputHint.textContent = 'Searching…';
  searchBtn.disabled = true;

  try {
    const resp = await fetch(`${API_BASE}/lookup?zip=${zip}`);
    if (!resp.ok) throw new Error(`Server error ${resp.status}`);
    const data = await resp.json();
    render(data);
  } catch (err) {
    showError(err.message);
  } finally {
    loading.style.display = 'none';
    searchBtn.disabled = false;
  }
}

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
  loading.style.display = 'none';
  noResults.style.display = 'none';
  inputHint.textContent = '';
}

function render(data) {
  const hasTarget = data.target && data.target.length > 0;
  const hasBestBuy = data.bestbuy && data.bestbuy.length > 0;

  if (!hasTarget && !hasBestBuy) {
    noResults.style.display = 'block';
    inputHint.textContent = '';
    return;
  }

  inputHint.textContent = `${data.zip} — ${data.target.reduce((a, p) => a + (p.stores || []).length, 0) + data.bestbuy.reduce((a, p) => a + (p.stores || []).length, 0)} nearby stores`;

  let totalStores = 0;
  let totalInStock = 0;
  let html = '';

  if (hasTarget) {
    let tInStock = 0;
    let tStores = 0;
    let rows = '';
    for (const prod of data.target) {
      if (prod.error) {
        rows += `<div class="product"><div class="product-header">${prod.name || prod.tcin} <span class="error-inline">— ${prod.error}</span></div></div>`;
        continue;
      }
      const stores = prod.stores || [];
      tStores += stores.length;
      tInStock += stores.filter(s => s.quantity > 0).length;
      rows += `<div class="product"><div class="product-header">${escHtml(prod.name)}</div>`;
      if (stores.length === 0) {
        rows += `<div class="empty-msg">No nearby stores</div>`;
      } else {
        rows += `<div class="stores">`;
        for (const s of stores) {
          const qCls = s.quantity > 0 ? 'ok' : 'zero';
          const dotCls = s.quantity > 0 ? 'green' : 'red';
          rows += `<div class="store">
            <span class="dot ${dotCls}"></span>
            <span class="id">#${escHtml(s.store_id)}</span>
            <span class="city">${escHtml(s.city)}</span>
            <span class="dist">${s.distance ?? '-'} mi</span>
            <span class="qty ${qCls}">${s.quantity}</span>
          </div>`;
        }
        rows += `</div>`;
      }
      rows += `</div>`;
    }
    totalInStock += tInStock;
    totalStores += tStores;
    html += `<div class="section">
      <div class="section-head">
        <h2>Target</h2>
        <span class="count">${tInStock} in stock · ${tStores} stores</span>
        <span class="line"></span>
      </div>${rows}
    </div>`;
  }

  if (hasBestBuy) {
    let bInStock = 0;
    let bStores = 0;
    let rows = '';
    for (const prod of data.bestbuy) {
      if (prod.error) {
        rows += `<div class="product"><div class="product-header">${prod.name || prod.sku} <span class="error-inline">— ${prod.error}</span></div></div>`;
        continue;
      }
      const stores = prod.stores || [];
      bStores += stores.length;
      bInStock += stores.filter(s => s.lowStock !== true).length;
      rows += `<div class="product"><div class="product-header">${escHtml(prod.name)}</div>`;
      if (stores.length === 0) {
        rows += `<div class="empty-msg">No nearby stores</div>`;
      } else {
        rows += `<div class="stores">`;
        for (const s of stores) {
          const dotCls = s.lowStock ? 'amber' : s.status === 'IN_STOCK' ? 'green' : 'gray';
          const lblCls = s.lowStock ? 'amber' : s.status === 'IN_STOCK' ? 'green' : 'gray';
          const lblTxt = s.lowStock ? 'Low' : s.status === 'IN_STOCK' ? 'In' : '—';
          rows += `<div class="store">
            <span class="dot ${dotCls}"></span>
            <span class="id">${escHtml(s.name || `BB #${s.store_id}`)}</span>
            <span class="city">${escHtml(s.city)}</span>
            <span class="dist">${s.distance ?? '-'} mi</span>
            <span class="label ${lblCls}">${lblTxt}</span>
          </div>`;
        }
        rows += `</div>`;
      }
      rows += `</div>`;
    }
    totalInStock += bInStock;
    totalStores += bStores;
    html += `<div class="section">
      <div class="section-head">
        <h2>Best Buy</h2>
        <span class="count">${bInStock} available · ${bStores} stores</span>
        <span class="line"></span>
      </div>${rows}
    </div>`;
  }

  const totalCount = data.target.reduce((a, p) => a + (p.stores || []).length, 0) + data.bestbuy.reduce((a, p) => a + (p.stores || []).length, 0);

  resultsDiv.innerHTML = `
    <div class="summary-bar">
      <span>Stores <value>${totalCount}</value></span>
      <span class="sep">·</span>
      <span>In stock <value>${totalInStock}</value></span>
    </div>
    ${html}
  `;
}

function escHtml(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
</script>
</body>
</html>
